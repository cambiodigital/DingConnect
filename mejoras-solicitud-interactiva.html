        const createWooOrderMetaCatalog = () => ([

            { name: "_dc_account_number", type: "meta", description: "Cuenta/telefono destino." },

            { name: "_dc_provider_name", type: "meta", description: "Proveedor/operador." },

            { name: "_dc_product_type", type: "meta", description: "Tipo de producto." },
            { name: "_dc_redemption_mechanism", type: "meta", description: "Mecanismo de redención." },

            { name: "_dc_is_range", type: "meta", description: "Flag de rango." },
            { name: "_dc_flow_kind", type: "meta", description: "Tipo de flujo inferido." },

        const FIELD_AUDIT_STATUS = {
            ProviderCode: "persistido",
            ProviderName: "derivado",
            SkuCode: "persistido",
            ProductType: "persistido",
            CountryIso: "persistido",
            RegionCode: "persistido",
            "RegionCodes[]": "persistido",
            SendValue: "persistido",
            SendCurrencyIso: "persistido",
            ReceiveValue: "persistido",
            ReceiveCurrencyIso: "persistido",
            ReceiveValueExcludingTax: "persistido",
            MinimumSendValue: "persistido",
            MaximumSendValue: "persistido",
            MinimumReceiveValue: "persistido",
            MaximumReceiveValue: "persistido",
            CustomerFee: "persistido",
            DistributorFee: "persistido",
            TaxRate: "persistido",
            TaxName: "persistido",
            TaxCalculation: "persistido",
            DefaultDisplayText: "persistido",
            DisplayText: "derivado",
            Description: "persistido",
            DescriptionMarkdown: "persistido",
            ReadMoreMarkdown: "persistido",
            AdditionalInformation: "persistido",
            IsPromotion: "persistido",
            IsRange: "persistido",
            "Benefits[]": "persistido",
            ValidityPeriodIso: "persistido",
            RedemptionMechanism: "persistido",
            ProcessingMode: "persistido",
            LookupBillsRequired: "persistido",
            "SettingDefinitions[]": "persistido",
            ValidationRegex: "persistido",
            CustomerCareNumber: "persistido",

        const createFieldFlowAuditCatalog = () => createApiFieldCatalog().map((field) => {
            const status = FIELD_AUDIT_STATUS[field.name] || "pendiente";
            const statusLabel = status === "persistido" ? "Persistido" : (status === "derivado" ? "Derivado" : "Pendiente");
            return {
                name: field.name,
                type: "status",
                description: `${statusLabel}: ${field.description}`,

        // --- DATOS INICIALES EXTRAÍDOS DEL DIAGRAMA ---
        const initialSystemData = {
        admin: {
            title: "1. Admin: Flujo de Catalogación",
            icon: <IconLayout className="w-6 h-6" />,
            nodes: [
            {
                id: "A1",
                name: "Buscar en API (paso inicial)",
                description: "Primer paso real en plugin: consulta DingConnect y arma listado para selección.",
                properties: createApiSearchResponseCatalog(),
                behaviors: [

                ]
            },
            {
                id: "A1B",
                name: "Buscar en API (payload interno)",
                description: "Campos extra que no se ven en columnas, pero viajan para hidratar alta manual y persistir metadatos.",
                properties: createApiSearchInternalPayloadCatalog(),
                behaviors: [
                "Estos campos alimentan hidden fields y enriquecen bundles guardados.",
                "No todos son visibles en la tabla de Buscar en API."
                ]
            },
            {
                id: "A2",
                name: "Hidratación API -> Alta manual",
                description: "Mapeo de campos desde resultado API hacia formulario manual (inputs visibles + hidden).",
                properties: createManualHydrationCatalog(),
                behaviors: [

            },
            {
                id: "A3",
                name: "Alta manual (hidden fields reales)",
                description: "Campos hidden actuales del formulario manual que transportan metadatos de API.",
                properties: createManualHiddenFieldCatalog(),
                behaviors: [

                "El llenado ocurre por fillManualForm con datos seleccionados de Buscar en API."

            },
            {
                id: "A5",

                description: "Paso de ajuste final antes de guardar bundle (coste, precio público, copy y metadatos).",
                properties: createManualVisibleFormCatalog(),
                behaviors: [
                "Desde aquí se ajustan campos comerciales sin perder contrato técnico API.",
                "Al guardar, la estructura pasa a dc_recargas_bundles para ser consumida por REST /products."
                ]
            }
            ]
        },
        persistence: {
            title: "2. Persistencia de Bundles",
            icon: <IconDatabase className="w-6 h-6" />,
            nodes: [
            {
                id: "B1",
                name: "Option: dc_recargas_bundles",
                description: "Estructura de guardado en la base de datos de WordPress.",
                properties: createBundlePersistedFieldCatalog(),
                behaviors: [
                "Objetivo actual: persistir contrato rico para no degradar la salida saved en frontend."
                ]
            }
            ]
        },
        api: {
            title: "4. REST /products",
            icon: <IconServer className="w-6 h-6" />,
            nodes: [
            {
                id: "F4",
                name: "Producto Saved Normalizado",
                description: "Salida del endpoint cuando lee de BBDD.",
                properties: [
                { name: "BundleId", type: "string", description: "" },
                ...createApiFieldCatalog(),
                ],
                behaviors: [
                "Debe reflejar el mismo contrato funcional del nodo live cuando el bundle fue creado/actualizado desde datos API.",
                "Si un campo no existe en bundle, usa fallback controlado para no romper frontend."
                ]
            },
            {
                id: "F7",
                name: "Producto Live Normalizado",
                description: "Salida del endpoint cuando consulta a la API de DingConnect.",
                properties: createApiFieldCatalog(),
                behaviors: [
                "Contiene toda la metadata rica necesaria para flujos de catálogo, wizard, landings y checkout.",
                "Este nodo debe tomarse como contrato objetivo para no perder campos al persistir bundles."
                ]
            },
            {
                id: "F8",
                name: "API -> Persistencia -> Landing (Auditoría)",
                description: "Matriz rápida por campo para verificar si se conserva en el flujo completo hasta frontend/landing.",
                properties: createFieldFlowAuditCatalog(),
                behaviors: [
                "Revisar este nodo antes de pedir cambios a IA para detectar huecos de contrato por campo.",
                "Estados esperados: Persistido (guardado), Derivado (calculado), Pendiente (falta implementar)."
                ]
            }
            ]
        },
        frontend: {
            title: "5. Frontend Público (Shortcode)",
            icon: <IconLayout className="w-6 h-6" />,
            nodes: [
            {
                id: "H1",
                name: "Consumo de /products y lógica dinámica",
                description: "El frontend usa contrato REST para seleccionar paquetes, validar y preparar envío.",
                properties: createFrontendRuntimeCatalog(),
                behaviors: [
                "Si IsRange=true ejecuta EstimatePrices antes de confirmar.",
                "Si LookupBillsRequired=true ejecuta LookupBills y envía bill_ref/settings en payload final.",
                "En modo WooCommerce reenvía datos al add-to-cart y difiere SendTransfer al pago confirmado."
                ]
            }
            ]
        },
        woocommerce: {
            title: "6. WooCommerce",
            icon: <IconShoppingCart className="w-6 h-6" />,
            nodes: [
            {
                id: "I1",
                name: "Cart Item Data",
                description: "Datos que viajan al carrito de WooCommerce.",
                properties: createWooCartItemCatalog(),
                behaviors: [
                "Persiste metadatos en item/order y espera order->is_paid() para ejecutar recarga.",
                "Reenvía settings/bill_ref a SendTransfer y aplica reconciliación cuando corresponde."
                ]
            },
            {
                id: "I2",
                name: "Order Item Meta (_dc_*)",
                description: "Metadatos exactos que WooCommerce persiste en la orden por cada item de recarga.",
                properties: createWooOrderMetaCatalog(),
                behaviors: [
                "Se usan para despacho post-pago, reconciliación y trazabilidad de soporte.",
                "Mantienen continuidad de bill_ref/settings y clasificación de flujo."
                ]
            }
            ]
        }
        };

        const requestTemplateDefaults = {
            objective: '',
            priority: 'media',
            impact: '',
            acceptanceCriteria: '',
            notes: '',
        };
        const MAX_RECENT_CHANGES = 8;
        const MAX_CHANGE_LOG_ENTRIES = 500;

        function App() {
            const [system, setSystem] = useState(initialSystemData);
            const [selectedNode, setSelectedNode] = useState(null);
            const [changeLog, setChangeLog] = useState([]);
            const [showPrompt, setShowPrompt] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [moduleFilter, setModuleFilter] = useState('all');
            const [requestTemplate, setRequestTemplate] = useState(requestTemplateDefaults);

            const [newProp, setNewProp] = useState({ name: '', type: 'string', description: '' });
            const [newBehavior, setNewBehavior] = useState('');

            const metrics = useMemo(() => {
                let nodes = 0;
                let properties = 0;
                let behaviors = 0;
                Object.values(system).forEach(group => {
                    nodes += group.nodes.length;
                    group.nodes.forEach(node => {
                        properties += node.properties.length;
                        behaviors += node.behaviors.length;
                    });
                });
                return { nodes, properties, behaviors };
            }, [system]);

            const filteredGroups = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                return Object.entries(system)
                    .filter(([key]) => moduleFilter === 'all' || key === moduleFilter)
                    .map(([key, group]) => {
                        if (!term) return [key, group];
                        const filteredNodes = group.nodes.filter(node => {
                            const source = [
                                node.id,
                                node.name,
                                node.description,
                                ...node.properties.map(prop => `${prop.name} ${prop.type} ${prop.description}`),
                                ...node.behaviors,
                            ].join(' ').toLowerCase();
                            return source.includes(term);
                        });
                        return [key, { ...group, nodes: filteredNodes }];
                    })
                    .filter(([, group]) => group.nodes.length > 0);
            }, [system, moduleFilter, searchTerm]);

            useEffect(() => {
                if (!selectedNode) return;
                for (const group of Object.values(system)) {
                    const currentNode = group.nodes.find(node => node.id === selectedNode.id);
                    if (currentNode) {
                        if (currentNode !== selectedNode) {
                            setSelectedNode(currentNode);
                        }
                        return;
                    }
                }
            }, [system, selectedNode]);

            const logChange = (action, entity, details) => {
                setChangeLog(prev => {
                    const next = [...prev, { id: Date.now(), action, entity, details, time: new Date().toLocaleTimeString() }];
                    return next.slice(-MAX_CHANGE_LOG_ENTRIES);
                });
            };

            const handleAddProperty = (e) => {
                e.preventDefault();
                if (!newProp.name || !selectedNode) return;
                const normalizedNewPropName = newProp.name.trim().toLowerCase();
                const alreadyExists = selectedNode.properties.some(
                    prop => prop.name.trim().toLowerCase() === normalizedNewPropName
                );
                if (alreadyExists) {
                    alert('Ya existe un campo con ese nombre (sin distinguir mayúsculas/minúsculas).');
                    return;
                }

                const updatedSystem = { ...system };
                for (const group in updatedSystem) {
                const nodeIndex = updatedSystem[group].nodes.findIndex(n => n.id === selectedNode.id);
                if (nodeIndex !== -1) {
                    updatedSystem[group].nodes[nodeIndex].properties.push({ ...newProp });
                    logChange('AGREGAR_CAMPO', selectedNode.name, `Se agregó el campo '${newProp.name}' (${newProp.type}): ${newProp.description}`);
                    setSelectedNode({ ...updatedSystem[group].nodes[nodeIndex] });
                    break;
                }
                }
                setSystem(updatedSystem);
                setNewProp({ name: '', type: 'string', description: '' });
            };

            const handleDeleteProperty = (propName) => {
                const updatedSystem = { ...system };
                for (const group in updatedSystem) {
                const nodeIndex = updatedSystem[group].nodes.findIndex(n => n.id === selectedNode.id);
                if (nodeIndex !== -1) {
                    updatedSystem[group].nodes[nodeIndex].properties = updatedSystem[group].nodes[nodeIndex].properties.filter(p => p.name !== propName);
                    logChange('ELIMINAR_CAMPO', selectedNode.name, `Se eliminó el campo '${propName}'`);
                    setSelectedNode({ ...updatedSystem[group].nodes[nodeIndex] });
                    break;
                }
                }
                setSystem(updatedSystem);
            };

            const handleAddBehavior = (e) => {
                e.preventDefault();
                if (!newBehavior || !selectedNode) return;

                const updatedSystem = { ...system };
                for (const group in updatedSystem) {
                const nodeIndex = updatedSystem[group].nodes.findIndex(n => n.id === selectedNode.id);
                if (nodeIndex !== -1) {
                    updatedSystem[group].nodes[nodeIndex].behaviors.push(newBehavior);
                    logChange('AGREGAR_COMPORTAMIENTO', selectedNode.name, `Nueva regla/salida: ${newBehavior}`);
                    setSelectedNode({ ...updatedSystem[group].nodes[nodeIndex] });
                    break;
                }
                }
                setSystem(updatedSystem);
                setNewBehavior('');
            };

            const handleDeleteBehavior = (index) => {
                const updatedSystem = { ...system };
                for (const group in updatedSystem) {
                    const nodeIndex = updatedSystem[group].nodes.findIndex(n => n.id === selectedNode.id);
                    if (nodeIndex !== -1) {
                    const removed = updatedSystem[group].nodes[nodeIndex].behaviors.splice(index, 1);
                    logChange('ELIMINAR_COMPORTAMIENTO', selectedNode.name, `Se eliminó regla: ${removed}`);
                    setSelectedNode({ ...updatedSystem[group].nodes[nodeIndex] });
                    break;
                    }
                }
                setSystem(updatedSystem);
            }

            const handleQuickTemplate = (type) => {
                if (!selectedNode) return;
                if (type === 'provider-code') {
                    setNewProp({
                        name: 'ProviderCode',
                        type: 'string',
                        description: 'Código real de proveedor DingConnect para no perder metadatos live.',
                    });
                    return;
                }
                if (type === 'setting-definitions') {
                    setNewProp({
                        name: 'SettingDefinitions',
                        type: 'array',
                        description: 'Definiciones dinámicas requeridas por el proveedor.',
                    });
                    return;
                }
                if (type === 'estimate-prices') {
                    setNewBehavior('Cuando IsRange sea true, consultar EstimatePrices y bloquear confirmación sin cálculo válido.');
                    return;
                }
                if (type === 'transfer-records') {
                    setNewBehavior('Si SendTransfer queda Submitted/timeout, consultar ListTransferRecords antes de reintentar.');
                }
            };

            const handleRemoveLastLog = () => {
                if (changeLog.length === 0) return;
                setChangeLog(prev => prev.slice(0, -1));
            };

            const handleResetSession = () => {
                if (!confirm('¿Seguro que deseas reiniciar el mini sistema y borrar el historial de cambios?')) return;
                setSystem(initialSystemData);
                setSelectedNode(null);
                setChangeLog([]);
                setSearchTerm('');
                setModuleFilter('all');
                setRequestTemplate(requestTemplateDefaults);
                setNewProp({ name: '', type: 'string', description: '' });
                setNewBehavior('');
            };

            const generateAIPrompt = () => {
                let prompt = `¡Hola! Necesito hacer mejoras en mi sistema de recargas basado en DingConnect y WooCommerce.\n\n`;
                prompt += `### Solicitud guiada\n`;
                prompt += `- Objetivo: ${requestTemplate.objective || 'No definido'}\n`;
                prompt += `- Prioridad: ${requestTemplate.priority}\n`;
                prompt += `- Impacto esperado: ${requestTemplate.impact || 'No definido'}\n`;
                prompt += `- Criterios de aceptación: ${requestTemplate.acceptanceCriteria || 'No definido'}\n`;
                prompt += `- Notas: ${requestTemplate.notes || 'Sin notas adicionales'}\n\n`;
                prompt += `### Resumen visual de arquitectura\n`;
                prompt += `- Módulos: ${Object.keys(system).length}\n`;
                prompt += `- Entidades: ${metrics.nodes}\n`;
                prompt += `- Campos: ${metrics.properties}\n`;
                prompt += `- Comportamientos: ${metrics.behaviors}\n\n`;
                prompt += `### Cambios estructurales solicitados\n\n`;
                
                if (changeLog.length === 0) {
                return prompt + "Aún no hay cambios estructurales en el historial. Agrega campos o reglas antes de generar la solicitud final.";
                }

                const groupedChanges = changeLog.reduce((acc, log) => {
                if (!acc[log.entity]) acc[log.entity] = [];
                acc[log.entity].push(log);
                return acc;
                }, {});

                for (const [entity, logs] of Object.entries(groupedChanges)) {
                prompt += `### En el módulo/entidad: **${entity}**\n`;
                logs.forEach(log => {
                    prompt += `- [${log.action}] ${log.details}\n`;
                });
                prompt += `\n`;
                }

                prompt += `\n**Instrucción para la IA:**\n`;
                prompt += `Por favor, propón e implementa cambios de código (PHP y JS) para aplicar esta solicitud, asegurando compatibilidad con backend REST del plugin, persistencia de bundles, frontend público y flujo WooCommerce. Incluye validación, riesgos y pruebas sugeridas.`;

                return prompt;
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(generateAIPrompt());
                alert("¡Prompt copiado al portapapeles! Ya puedes pegarlo en el chat de la IA.");
            };

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-800">
                {/* HEADER */}
                <header className="bg-indigo-900 text-white p-4 shadow-md flex justify-between items-center shrink-0">
                    <div>
                    <h1 className="text-2xl font-bold flex items-center gap-2">
                        <IconSettings className="w-7 h-7 text-indigo-300" />
                        DingConnect System Architect
                    </h1>
                    <p className="text-indigo-200 text-sm mt-1">Modela propiedades, salidas y genera el prompt de actualización</p>
                    </div>
                    <button 
                    onClick={() => setShowPrompt(true)}
                    className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-semibold transition-colors shadow-sm"
                    >
                    <IconMessageSquare className="w-5 h-5" />
                    Generar Prompt IA ({changeLog.length} cambios)
                    </button>
                </header>

                {/* BARRA DE CONTROLES */}
                <section className="bg-white border-b border-slate-200 p-4 grid grid-cols-1 lg:grid-cols-4 gap-3">
                    <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-3">
                        <p className="text-xs text-indigo-700">Entidades</p>
                        <p className="text-2xl font-bold text-indigo-900">{metrics.nodes}</p>
                    </div>
                    <div className="bg-blue-50 border border-blue-100 rounded-lg p-3">
                        <p className="text-xs text-blue-700">Campos</p>
                        <p className="text-2xl font-bold text-blue-900">{metrics.properties}</p>
                    </div>
                    <div className="bg-amber-50 border border-amber-100 rounded-lg p-3">
                        <p className="text-xs text-amber-700">Comportamientos</p>
                        <p className="text-2xl font-bold text-amber-900">{metrics.behaviors}</p>
                    </div>
                    <div className="bg-green-50 border border-green-100 rounded-lg p-3">
                        <p className="text-xs text-green-700">Historial</p>
                        <p className="text-2xl font-bold text-green-900">{changeLog.length}</p>
                    </div>

                    <div className="lg:col-span-2 flex items-center gap-2 border border-slate-300 rounded-lg px-3 bg-slate-50">
                        <input
                            type="text"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            placeholder="Buscar por entidad, campo o comportamiento..."
                            className="w-full py-2 bg-transparent text-sm focus:outline-none"
                        />
                    </div>
                    <select
                        value={moduleFilter}
                        onChange={(e) => setModuleFilter(e.target.value)}
                        className="border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white"
                    >
                        <option value="all">Todos los módulos</option>
                        {Object.entries(system).map(([key, group]) => (
                            <option key={key} value={key}>{group.title}</option>
                        ))}
                    </select>
                    <div className="flex gap-2">
                        <button
                            onClick={handleRemoveLastLog}
                            className="flex-1 bg-white border border-slate-300 hover:bg-slate-100 rounded-lg px-3 py-2 text-xs font-semibold"
                        >
                            Quitar último log
                        </button>
                        <button
                            onClick={handleResetSession}
                            className="flex-1 bg-red-50 text-red-700 border border-red-200 hover:bg-red-100 rounded-lg px-3 py-2 text-xs font-semibold"
                        >
                            Reiniciar sesión
                        </button>
                    </div>
                </section>

                <main className="flex-1 flex overflow-hidden">
                    
                    {/* PANEL IZQUIERDO: ARQUITECTURA */}
                    <div className="w-1/2 p-6 overflow-y-auto border-r border-slate-200 bg-slate-100/50">
                    <h2 className="text-xl font-bold mb-6 text-slate-700">Módulos del Sistema</h2>
                    
                    <div className="space-y-6">
                        {filteredGroups.map(([key, group]) => (
                        <div key={key} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-100 p-3 border-b border-slate-200 flex items-center gap-2 font-semibold text-slate-700">
                            {group.icon} {group.title}
                            </div>
                            <div className="p-4 space-y-3">
                            {group.nodes.map(node => (
                                <div 
                                key={node.id} 
                                onClick={() => setSelectedNode(node)}
                                className={`p-3 rounded-lg border-2 cursor-pointer transition-all ${
                                    selectedNode?.id === node.id 
                                    ? 'border-indigo-500 bg-indigo-50 shadow-md' 
                                    : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50'
                                }`}
                                >
                                <div className="flex justify-between items-start">
                                    <div>
                                    <h3 className="font-bold text-indigo-900">{node.name}</h3>
                                    <p className="text-xs text-slate-500 mt-1">{node.description}</p>
                                    </div>
                                    <span className="bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded font-mono">
                                    ID: {node.id}
                                    </span>
                                </div>
                                
                                <div className="mt-3 flex gap-2 text-xs">
                                    <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded-full">
                                    {node.properties.length} Propiedades
                                    </span>
                                    <span className="bg-amber-100 text-amber-800 px-2 py-1 rounded-full">
                                    {node.behaviors.length} Comportamientos
                                    </span>
                                </div>
                                </div>
                            ))}
                            </div>
                        </div>
                        ))}
                        {filteredGroups.length === 0 && (
                            <div className="bg-white rounded-xl border border-slate-200 p-4 text-sm text-slate-500">
                                Sin resultados para el filtro actual.
                            </div>
                        )}
                    </div>

                    <div className="mt-6 bg-white rounded-xl border border-slate-200 p-4">
                        <h3 className="font-semibold text-slate-800 mb-3">Cambios recientes</h3>
                        <ul className="space-y-2 max-h-64 overflow-y-auto pr-1">
                            {changeLog.slice(-MAX_RECENT_CHANGES).reverse().map((log) => (
                                <li key={log.id} className="text-xs bg-slate-50 border border-slate-200 rounded p-2">
                                    <span className="font-semibold text-indigo-700">[{log.action}]</span> {log.details}
                                    <div className="text-slate-500 mt-1">{log.entity} · {log.time}</div>
                                </li>
                            ))}
                            {changeLog.length === 0 && (
                                <li className="text-sm text-slate-500">Aún no hay cambios registrados.</li>
                            )}
                        </ul>
                    </div>
                    </div>

                    {/* PANEL DERECHO: EDITOR DE ENTIDAD */}
                    <div className="w-1/2 bg-white flex flex-col overflow-y-auto relative">
                    {!selectedNode ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 text-center h-full min-h-[500px]">
                        <IconLayout className="w-16 h-16 mb-4 opacity-50" />
                        <h2 className="text-xl font-semibold text-slate-500">Selecciona una entidad</h2>
                        <p className="mt-2">Haz clic en un módulo de la izquierda para explorar y modificar sus campos y reglas.</p>
                        </div>
                    ) : (
                        <div className="flex-1 p-6">
                        <div className="mb-6">
                            <h2 className="text-2xl font-bold text-indigo-900">{selectedNode.name}</h2>
                            <p className="text-slate-500">{selectedNode.description}</p>
                        </div>

                        <div className="mb-6 bg-indigo-50 border border-indigo-100 rounded-lg p-4">
                            <p className="text-sm font-semibold text-indigo-900 mb-2">Plantillas rápidas de mejora</p>
                            <div className="flex flex-wrap gap-2">
                                <button onClick={() => handleQuickTemplate('provider-code')} className="text-xs bg-white border border-indigo-200 hover:bg-indigo-100 rounded px-3 py-2">Campo: ProviderCode</button>
                                <button onClick={() => handleQuickTemplate('setting-definitions')} className="text-xs bg-white border border-indigo-200 hover:bg-indigo-100 rounded px-3 py-2">Campo: SettingDefinitions</button>
                                <button onClick={() => handleQuickTemplate('estimate-prices')} className="text-xs bg-white border border-indigo-200 hover:bg-indigo-100 rounded px-3 py-2">Regla: EstimatePrices</button>
                                <button onClick={() => handleQuickTemplate('transfer-records')} className="text-xs bg-white border border-indigo-200 hover:bg-indigo-100 rounded px-3 py-2">Regla: ListTransferRecords</button>
                            </div>
                        </div>

                        {/* SECCIÓN PROPIEDADES */}
                        <div className="mb-8">
                            <h3 className="text-lg font-semibold border-b pb-2 mb-4 flex justify-between items-center text-slate-800">
                            Campos de Datos (Propiedades)
                            </h3>
                            
                            <div className="bg-slate-50 rounded-lg border border-slate-200 overflow-hidden mb-4">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-100 text-slate-600">
                                <tr>
                                    <th className="px-4 py-2">Nombre</th>
                                    <th className="px-4 py-2">Tipo</th>
                                    <th className="px-4 py-2">Descripción / Origen</th>
                                    <th className="px-4 py-2 text-right">Acción</th>
                                </tr>
                                </thead>
                                <tbody>
                                {selectedNode.properties.map((prop, idx) => (
                                    <tr key={idx} className="border-t border-slate-200 hover:bg-slate-100 transition-colors">
                                    <td className="px-4 py-3 font-mono font-semibold text-indigo-700">{prop.name}</td>
                                    <td className="px-4 py-3">
                                        <span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded text-xs">
                                        {prop.type}
                                        </span>
                                    </td>
                                    <td className="px-4 py-3 text-slate-600">{prop.description}</td>
                                    <td className="px-4 py-3 text-right">
                                        <button 
                                        onClick={() => handleDeleteProperty(prop.name)}
                                        className="text-red-400 hover:text-red-600 p-1"
                                        title="Eliminar campo"
                                        >
                                        <IconTrash2 className="w-4 h-4 inline" />
                                        </button>
                                    </td>
                                    </tr>
                                ))}
                                </tbody>
                            </table>
                            </div>

                            {/* Formulario Agregar Propiedad */}
                            <form onSubmit={handleAddProperty} className="bg-indigo-50/50 p-4 rounded-lg border border-indigo-100 flex flex-wrap gap-3 items-end">
                            <div className="flex-1 min-w-[150px]">
                                <label className="block text-xs font-semibold text-indigo-800 mb-1">Nuevo Campo</label>
                                <input 
                                type="text" 
                                placeholder="ej: ProviderCode" 
                                className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                value={newProp.name}
                                onChange={(e) => setNewProp({...newProp, name: e.target.value})}
                                />
                            </div>
                            <div className="w-32">
                                <label className="block text-xs font-semibold text-indigo-800 mb-1">Tipo</label>
                                <select 
                                className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white"
                                value={newProp.type}
                                onChange={(e) => setNewProp({...newProp, type: e.target.value})}
                                >
                                <option value="string">String</option>
                                <option value="float">Float/Int</option>
                                <option value="boolean">Boolean</option>
                                <option value="array">Array</option>
                                <option value="object">Object</option>
                                </select>
                            </div>
                            <div className="flex-1 min-w-[200px]">
                                <label className="block text-xs font-semibold text-indigo-800 mb-1">Descripción / Mapeo</label>
                                <input 
                                type="text" 
                                placeholder="De dónde viene o qué hace" 
                                className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                value={newProp.description}
                                onChange={(e) => setNewProp({...newProp, description: e.target.value})}
                                />
                            </div>
                            <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded flex items-center justify-center transition-colors">
                                <IconPlus className="w-5 h-5" />
                            </button>
                            </form>
                        </div>

                        {/* SECCIÓN COMPORTAMIENTOS */}
                        <div className="mb-8">
                            <h3 className="text-lg font-semibold border-b pb-2 mb-4 flex justify-between items-center text-slate-800">
                            Comportamientos / Validaciones / Salidas
                            </h3>
                            
                            <ul className="space-y-2 mb-4">
                            {selectedNode.behaviors.map((beh, idx) => (
                                <li key={idx} className="flex gap-3 items-start bg-amber-50 border border-amber-200 p-3 rounded-lg text-amber-900 text-sm">
                                <IconArrowRight className="w-5 h-5 text-amber-500 shrink-0 mt-0.5" />
                                <span className="flex-1">{beh}</span>
                                <button 
                                    onClick={() => handleDeleteBehavior(idx)}
                                    className="text-amber-400 hover:text-red-500 p-1"
                                >
                                    <IconTrash2 className="w-4 h-4 inline" />
                                </button>
                                </li>
                            ))}
                            </ul>

                            {/* Formulario Agregar Comportamiento */}
                            <form onSubmit={handleAddBehavior} className="flex gap-2">
                            <input 
                                type="text" 
                                placeholder="Ej: Validar que si IsRange es true..." 
                                className="flex-1 px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none"
                                value={newBehavior}
                                onChange={(e) => setNewBehavior(e.target.value)}
                            />
                            <button type="submit" className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded text-sm font-semibold transition-colors flex items-center gap-1">
                                <IconPlus className="w-4 h-4" /> Regla
                            </button>
                            </form>
                        </div>

                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <h3 className="text-lg font-semibold text-slate-800 mb-3">Solicitud guiada para IA</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Objetivo principal</label>
                                    <input
                                        type="text"
                                        value={requestTemplate.objective}
                                        onChange={(e) => setRequestTemplate({ ...requestTemplate, objective: e.target.value })}
                                        placeholder="Qué quieres mejorar exactamente"
                                        className="w-full px-3 py-2 border border-slate-300 rounded text-sm"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Prioridad</label>
                                    <select
                                        value={requestTemplate.priority}
                                        onChange={(e) => setRequestTemplate({ ...requestTemplate, priority: e.target.value })}
                                        className="w-full px-3 py-2 border border-slate-300 rounded text-sm bg-white"
                                    >
                                        <option value="alta">Alta</option>
                                        <option value="media">Media</option>
                                        <option value="baja">Baja</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Impacto esperado</label>
                                    <input
                                        type="text"
                                        value={requestTemplate.impact}
                                        onChange={(e) => setRequestTemplate({ ...requestTemplate, impact: e.target.value })}
                                        placeholder="Qué verá negocio o usuario"
                                        className="w-full px-3 py-2 border border-slate-300 rounded text-sm"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Criterios de aceptación</label>
                                    <input
                                        type="text"
                                        value={requestTemplate.acceptanceCriteria}
                                        onChange={(e) => setRequestTemplate({ ...requestTemplate, acceptanceCriteria: e.target.value })}
                                        placeholder="Cómo sabrás que quedó bien"
                                        className="w-full px-3 py-2 border border-slate-300 rounded text-sm"
                                    />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Notas técnicas / restricciones</label>
                                    <textarea
                                        value={requestTemplate.notes}
                                        onChange={(e) => setRequestTemplate({ ...requestTemplate, notes: e.target.value })}
                                        placeholder="Dependencias, límites de seguridad, contexto operativo..."
                                        className="w-full px-3 py-2 border border-slate-300 rounded text-sm min-h-[78px]"
                                    />
                                </div>
                            </div>
                        </div>

                        </div>
                    )}
                    </div>
                </main>

                {/* MODAL DEL PROMPT */}
                {showPrompt && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="bg-slate-800 text-white p-5 flex justify-between items-center">
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg> 
                            Prompt Generado para la IA
                        </h2>
                        <button onClick={() => setShowPrompt(false)} className="text-slate-400 hover:text-white transition-colors">
                            <IconXCircle className="w-6 h-6" />
                        </button>
                        </div>
                        
                        <div className="p-6 flex-1 overflow-y-auto bg-slate-50">
                        <p className="text-slate-600 mb-4 font-medium">
                            Copia el siguiente texto estructurado y envíaselo a la IA para que aplique los cambios arquitectónicos que has diseñado:
                        </p>
                        
                        <div className="bg-slate-900 text-green-400 p-4 rounded-lg font-mono text-sm whitespace-pre-wrap overflow-x-auto shadow-inner border border-slate-700">
                            {generateAIPrompt()}
                        </div>
                        </div>
                        
                        <div className="p-5 border-t border-slate-200 bg-white flex justify-between items-center">
                        <div className="text-sm text-slate-500">
                            <span className="font-bold">{changeLog.length}</span> cambios registrados.
                        </div>
                        <div className="flex gap-3">
                            <button 
                            onClick={() => setShowPrompt(false)}
                            className="px-4 py-2 text-slate-600 font-semibold hover:bg-slate-100 rounded-lg transition-colors"
                            >
                            Cerrar
                            </button>
                            <button 
                            onClick={copyToClipboard}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-md"
                            >
                            <IconSave className="w-5 h-5" />
                            Copiar al Portapapeles
                            </button>
                        </div>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
